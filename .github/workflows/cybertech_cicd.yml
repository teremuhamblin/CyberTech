name: CyberTech CI/CD Pipeline

on:
  push:
    branches: [ main, dev, staging ]
    paths:
      - "**.js"
      - "**.css"
      - "**.html"
      - "src/**"
      - ".github/workflows/**"

  pull_request:
    branches: [ main ]

  workflow_dispatch:

  schedule:
    - cron: "0 3 * * *" # Build quotidien

  release:
    types: [created]

permissions:
  contents: write
  actions: read
  checks: write
  pull-requests: write
  security-events: write
  pages: write
  id-token: write

jobs:

  # ---------------------------------------------------------
  # 1) MATRIX BUILD (Node 18 / 20 / 22)
  # ---------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint || true

      - name: Test
        run: npm test || true

      - name: Build
        run: npm run build

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.node }}
          path: dist/

  # ---------------------------------------------------------
  # 2) SECURITY (CodeQL + npm audit + SAST + DAST)
  # ---------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: CodeQL Init
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: CodeQL Analyze
        uses: github/codeql-action/analyze@v3

      - name: npm audit
        run: npm audit --audit-level=moderate || true

      - name: SAST (semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"

      - name: DAST (OWASP ZAP baseline)
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: "https://teremu.github.io/cybertech"

  # ---------------------------------------------------------
  # 3) LIGHTHOUSE CI
  # ---------------------------------------------------------
  lighthouse:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse
        run: lhci autorun || true

  # ---------------------------------------------------------
  # 4) DOCKER BUILD & PUSH (OPTIONNEL)
  # ---------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: teremu/cybertech:latest

  # ---------------------------------------------------------
  # 5) DEPLOY GITHUB PAGES
  # ---------------------------------------------------------
  pages:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-20
          path: dist/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - uses: actions/deploy-pages@v4

  # ---------------------------------------------------------
  # 6) CALL LANCH.YML
  # ---------------------------------------------------------
  lanch:
    runs-on: ubuntu-latest
    needs: pages
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger lanch.yml
        uses: ./.github/workflows/lanch.yml

  # ---------------------------------------------------------
  # 7) AUTO RELEASE
  # ---------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: lanch
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------
  # 8) NOTIFICATIONS
  # ---------------------------------------------------------
  notify:
    runs-on: ubuntu-latest
    needs: [release, lanch]

    steps:
      - name: Console Notification
        run: echo "CyberTech CI/CD pipeline completed."

      - name: Discord Notification
        if: env.DISCORD_WEBHOOK != ''
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"🚀 CyberTech CI/CD terminé avec succès !\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
